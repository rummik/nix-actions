name: release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
